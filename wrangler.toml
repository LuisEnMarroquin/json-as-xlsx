# Cloudflare Pages configuration.
# `develop` is the production branch (https://xlsx.luismarroquin.com / https://xlsx.pages.dev);
# other branches get preview deployments. The dashboard build command stays
# `yarn build && yarn static`, which writes the static site into `build/`.
name = "xlsx"
pages_build_output_dir = "build"
compatibility_date = "2026-06-16"
